# SAM²-Q-VLA-HMVP Configuration with Incremental Updates

# Data
data_dir: "D:/experiment/SAM_Q/data"
batch_size: 2
num_workers: 2

# Model
model:
  # SAM² Dual-Scale Encoder
  sam_high_res: 1024
  sam_low_res: 256
  
  # H-MVP Collision Detector
  hmvp_max_level: 4
  hmvp_base_resolution: 8
  hmvp_early_out_threshold: 0.1
  
  # Neural Lifter
  lifting_hidden_dim: 256
  num_candidates: 5
  optimization_steps: 10
  
  # Incremental Updates (NEW FEATURE)
  incremental_updates: true
  
  # Freezing strategies
  freeze_sam2_components: true
  freeze_qwen_components: true

# Loss
mask_weight: 1.0
text_weight: 0.5

# Optimizer
optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-4

# Scheduler
scheduler:
  T_max: 50
  eta_min: 1.0e-6

# Training
num_epochs: 50
output_dir: "D:/experiment/SAM_Q/outputs_sam2qvla_incremental"

# Device
device: "cuda"