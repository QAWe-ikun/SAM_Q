# ============================================================================
# SAM-Q [SEG] Token Configuration (SA2VA-inspired)
# ============================================================================
# Inherits from base.yaml, enables [SEG] token bridging mode.
# LLM reasons about the instruction, then [SEG] hidden state becomes SAM3 prompt.
# ============================================================================

_base_: "base.yaml"

experiment:
  name: "samq_seg_token"
  description: "SAM-Q with SA2VA-inspired [SEG] token bridging"

model:
  encoding_mode: "seg_token"

  seg_token:
    hidden_dim: 512
    num_output_tokens: 64
    max_generate_tokens: 128
    dropout: 0.1
    force_only_in_training: true
