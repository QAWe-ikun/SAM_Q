# ============================================================================
# SAM-Q [SEG] Token Configuration (SA2VA-inspired)
# ============================================================================
# Inherits from base.yaml, enables multi-SEG token bridging mode.
# Qwen3-VL reasons first, then outputs multiple [SEG0]~[SEG{n-1}] tokens.
# ============================================================================

_base_: "base.yaml"

experiment:
  name: "samq_seg_token"
  description: "SAM-Q with SA2VA-inspired multi-SEG token bridging"

model:
  num_seg_tokens: 64

  seg_token:
    hidden_dim: 512
    num_output_tokens: 64
    max_generate_tokens: 128
    dropout: 0.1
    force_only_in_training: true
