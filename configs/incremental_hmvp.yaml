# ============================================================================
# SAM-Q Incremental H-MVP Configuration
# ============================================================================
# Configuration for incremental H-MVP memory system
# ============================================================================

_base_: "hmvp.yaml"

experiment:
  name: "samq_incremental_hmvp"
  description: "SAM-Q with incremental H-MVP memory"

# Enable incremental H-MVP
advanced:
  incremental_hmvp:
    enabled: true
    update_threshold: 0.3
    max_objects: 50

# Training for incremental H-MVP
training:
  num_epochs: 50
  batch_size: 2
  save_dir: "outputs_incremental_hmvp/"

loss:
  type: "vla"
  heatmap_weight: 1.0
  collision_weight: 0.5
  semantic_weight: 0.3
