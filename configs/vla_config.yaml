# VLA Configuration

# Data
data_dir: "D:/experiment/SAM_Q/data"
batch_size: 2
num_workers: 2

# Model
model:
  qwen_model_name: "Qwen/Qwen3-VL-7B-Instruct"
  sam3_input_dim: 256
  qwen_hidden_dim: 3584
  adapter_hidden_dim: 512

# Freeze
freeze_sam3_image_encoder: true
freeze_qwen3vl: true  # 只训练 Adapter

# Loss
mask_weight: 1.0
text_weight: 0.5

# Optimizer
optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-4

# Scheduler
scheduler:
  T_max: 50
  eta_min: 1.0e-6

# Training
num_epochs: 50
output_dir: "D:/experiment/SAM_Q/outputs_vla"

# Device
device: "cuda"
