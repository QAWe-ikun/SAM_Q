# ============================================================================
# SAM-Q Inference Configuration
# ============================================================================
# Config for Basic Inference (predict command).
# [SEG] token → parallel outputs:
#   ├→ SAM3 Decoder    → placement heatmap (position)
#   └→ SEGActionHead   → rotation_6d + rotation_matrix + scale_relative
# ============================================================================

# ----------------------------------------------------------------------------
# Model Architecture
# ----------------------------------------------------------------------------
model:
  # [SEG] tokens: 1=single placement, >1=multi-placement
  num_seg_tokens: 1

  # Qwen3-VL Encoder
  qwen:
    model_name: "./models/qwen3_vl"
    hidden_dim: 4096
    attn_implementation: "flash_attention_2"

  # SAM3 Components
  sam3:
    model_name: "./models/sam3"
    input_dim: 256

  # Adapter
  adapter:
    type: "cross_modal"
    hidden_dim: 512
    num_queries: 64
    dropout: 0.1

  # [SEG] Token config
  seg_token:
    max_generate_tokens: 128
    dropout: 0.1

  # SEGActionHead (rotation + scale)
  action_head:
    heatmap_size: 64

# ----------------------------------------------------------------------------
# Inference Configuration
# ----------------------------------------------------------------------------
inference:
  checkpoint_path: null
  threshold: 0.5
  device: "cuda"

  save_visualizations: true
  save_json: true
  output_dir: "results/"

