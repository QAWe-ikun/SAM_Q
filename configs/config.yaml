# ============================================================================
# SAM-Q Inference Configuration
# ============================================================================
# Config for Basic Inference (predict command).
# <SEG> token → parallel outputs:
#   ├→ SAM3 Decoder    → placement heatmap (position)
#   └→ SEGActionHead   → rotation_6d + rotation_matrix + scale_relative
# ============================================================================

# ----------------------------------------------------------------------------
# Model Architecture
# ----------------------------------------------------------------------------
model:
  # <SEG> tokens: 1=single placement, >1=multi-placement
  num_seg_tokens: 1

  # Qwen3-VL Encoder
  qwen:
    model_name: "./models/qwen3_vl"
    lora_path: "/mnt/f/output/test_stage1/test_stage1_20260416_115004/lora_weights"  # Stage 1 LoRA (adapter_model.safetensors 所在目录)
    hidden_dim: 4096
    attn_implementation: "flash_attention_2"

  # SAM3 Components
  sam3:
    sam_checkpoint_path: "/mnt/f/outputs/stage2_full/stage2_decoder_20260416_152846/sam3_checkpoint_final.pt"  # SAM3 pretrained weights (用于初始化模型结构)
    input_dim: 256

  # Adapter: <SEG> hidden state → SAM3 prompt embeddings
  adapter:
    adapter_checkpoint_path: "/mnt/f/outputs/stage2_full/stage2_decoder_20260416_152846/adapter_checkpoint_final.pt"  # e.g., "outputs/stage2_full/adapter_checkpoint_best.pt" (Stage 2 训练后生成的 adapter 权重)
    hidden_dim: 512
    num_queries: 64
    dropout: 0.1

  # <SEG> Token config (optional)
  seg_token:
    max_generate_tokens: 128      # Max tokens for <SEG> generation
    force_only_in_training: true  # Force <SEG>-only output during training
    dropout: 0.1

  # SEGActionHead (rotation + scale prediction)
  action_head:
    heatmap_size: 64

# ----------------------------------------------------------------------------
# Inference Configuration
# ----------------------------------------------------------------------------
inference:
  output_dir: "outputs/"  # 自动查找拆分权重的目录
  
  threshold: 0.5              # Confidence threshold for heatmap binarization
  device: "cuda"              # "cuda", "cpu", or "auto"

  save_visualizations: true   # Save overlay image (prediction.png)
  save_json: true             # Save structured results (prediction.json)
