# ============================================================================
# Test Stage 1: Qwen3-VL LoRA 微调
# ============================================================================
# 测试用最小配置，3 epoch 快速跑通
# 训练完后运行预提取:
#   python scripts/extract_seg_features.py --config configs/test_stage1.yaml --output_dir data/seg_features/
# 然后用 test_stage2.yaml 训练 Stage 2
# ============================================================================

experiment:
  name: "test_stage1"
  seed: 42
  description: "Test Stage 1: Qwen3-VL LoRA fine-tuning"

data:
  root_dir: "data/"
  ann_file: "annotations.json"
  batch_size: 1
  num_workers: 0
  pin_memory: false

model:
  num_seg_tokens: 1

  qwen:
    model_name: "./models/qwen3_vl"
    hidden_dim: 4096
    freeze: false
    attn_implementation: "flash_attention_2"

    lora:
      enabled: true
      r: 8
      alpha: 16
      dropout: 0.05
      target_modules:
        - "q_proj"
        - "v_proj"
      use_qlora: false
      bias: "none"

  sam3:
    model_name: "./models/sam3"
    input_dim: 256
    freeze_image_encoder: true
    freeze_detector: true

  adapter:
    freeze: true
    hidden_dim: 512
    num_queries: 64
    dropout: 0.1

  seg_token:
    max_generate_tokens: 128
    dropout: 0.1

  action_head:
    heatmap_size: 64

loss:
  type: "lm"
  label_smoothing: 0.0

optimizer:
  type: "AdamW"
  lr: 1.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]

scheduler:
  type: "CosineAnnealingLR"
  T_max: 3
  eta_min: 1.0e-6
  warmup_epochs: 0

training:
  num_epochs: 3
  device: "cuda"
  save_dir: "/mnt/f/output/test_stage1"
  save_epoch: false  # Set true to save every epoch
  save_interval: 1
  save_best: false
  log_interval: 1
  early_stopping: false
