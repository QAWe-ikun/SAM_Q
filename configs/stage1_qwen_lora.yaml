# ============================================================================
# Stage 1: Qwen3-VL LoRA Fine-tuning
# ============================================================================
# Goal: Teach Qwen3-VL to output <SEG> token based on text + images
# Loss: Language modeling (next-token prediction)
# Trainable: Qwen3-VL LoRA only (~0.1% of 8B params)
# ============================================================================

experiment:
  name: "stage1_qwen_lora"
  seed: 42
  description: "Stage 1: Fine-tune Qwen3-VL with LoRA to output <SEG> token"

data:
  root_dir: "data/"
  pin_memory: false

model:
  num_seg_tokens: 1

  qwen:
    model_name: "./models/qwen3_vl"
    hidden_dim: 4096
    freeze: false  # ← Enable LoRA training
    attn_implementation: "flash_attention_2"
    lora_path: null  # ← No pre-trained LoRA for Stage 1

    lora:
      enabled: true
      r: 64
      alpha: 128
      dropout: 0.05
      target_modules:
        - "q_proj"
        - "k_proj"
        - "v_proj"
        - "o_proj"
        - "gate_proj"
        - "up_proj"
        - "down_proj"
      use_qlora: false  # Set true if VRAM < 12GB
      bias: "none"

  adapter:
    freeze: true  # ← Frozen in Stage 1
    hidden_dim: 512
    num_queries: 64
    dropout: 0.1

  seg_token:
    max_generate_tokens: 128
    dropout: 0.1

  action_head:
    heatmap_size: 64

loss:
  type: "lm"  # Language modeling loss
  label_smoothing: 0.0

optimizer:
  type: "AdamW"
  lr: 1.0e-4  # LoRA learning rate
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]

scheduler:
  type: "CosineAnnealingLR"
  T_max: 3
  eta_min: 1.0e-6
  warmup_epochs: 1

training:
  num_epochs: 3  # 2-5 epochs typically sufficient
  device: "cuda"
  save_dir: "/mnt/f/outputs/stage1_lora/"
  save_best: true
  save_epoch: false  # Set true to save at save_interval epochs
  save_interval: 500  # Save every N steps (when save_epoch=false)
  save_total_limit: 3
  log_interval: 10
  early_stopping: false
  gradient_accumulation_steps: 8  # Effective batch size = batch_size * gradient_accumulation_steps
  batch_size: 2  # per_device_train_batch_size for SFTTrainer
  fp16: false  # Set true for older GPUs (may cause NaN gradients)
  bf16: true   # Recommended for RTX 30/40 series or newer
