# ============================================================================
# Stage 1: Qwen3-VL LoRA Fine-tuning
# ============================================================================
# Goal: Teach Qwen3-VL to output [SEG] token based on text + images
# Loss: Language modeling (next-token prediction)
# Trainable: Qwen3-VL LoRA only (~0.1% of 8B params)
# ============================================================================

experiment:
  name: "stage1_qwen_lora"
  seed: 42
  description: "Stage 1: Fine-tune Qwen3-VL with LoRA to output [SEG] token"

data:
  root_dir: "data/"
  ann_file: "annotations.json"
  batch_size: 1
  num_workers: 0
  pin_memory: false

model:
  num_seg_tokens: 1

  qwen:
    model_name: "./models/qwen3_vl"
    hidden_dim: 4096
    freeze: false  # ← Enable LoRA training
    attn_implementation: "flash_attention_2"

    lora:
      enabled: true
      r: 64
      alpha: 128
      dropout: 0.05
      target_modules:
        - "q_proj"
        - "k_proj"
        - "v_proj"
        - "o_proj"
        - "gate_proj"
        - "up_proj"
        - "down_proj"
      use_qlora: false  # Set true if VRAM < 12GB
      bias: "none"

  sam3:
    model_name: "./models/sam3"
    input_dim: 256
    freeze_image_encoder: true
    freeze_detector: true  # ← Frozen in Stage 1

  adapter:
    freeze: true  # ← Frozen in Stage 1
    hidden_dim: 512
    num_queries: 64
    dropout: 0.1

  seg_token:
    max_generate_tokens: 128
    dropout: 0.1

  action_head:
    heatmap_size: 64

loss:
  type: "lm"  # Language modeling loss
  label_smoothing: 0.0

optimizer:
  type: "AdamW"
  lr: 1.0e-4  # LoRA learning rate
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]

scheduler:
  type: "CosineAnnealingLR"
  T_max: 3
  eta_min: 1.0e-6
  warmup_epochs: 1

training:
  num_epochs: 3  # 2-5 epochs typically sufficient
  device: "cuda"
  save_dir: "outputs/stage1_lora/"
  save_best: true
  save_every_epoch: false  # Set true to save every epoch
  save_interval: 1  # Save every N epochs (when save_every_epoch=false)
  log_interval: 10
  early_stopping: false
