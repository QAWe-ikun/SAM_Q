# ============================================================================
# SAM-Q VLA Configuration
# ============================================================================
# [SEG] token → parallel outputs:
#   ├→ SAM3 Decoder → placement heatmap (position)
#   └→ SEGActionHead → rotation_deg + scale_relative
# ============================================================================

_base_: "base.yaml"

experiment:
  name: "samq_vla"
  description: "SAM-Q with parallel heatmap + rotation + scale output"

model:
  num_seg_tokens: 1  # Single [SEG] for all outputs

  # Action head config (rotation + scale)
  action_head:
    heatmap_size: 64              # Action heatmap resolution
    use_iterative_refinement: false
    max_iterations: 3
    adjustment_threshold: 0.01    # Meters

  # [SEG] token config
  seg_token:
    max_generate_tokens: 128
    dropout: 0.1
    force_only_in_training: true

# Training
training:
  num_epochs: 50
  batch_size: 2
  save_dir: "outputs_vla/"

# VLA loss: heatmap + rotation + scale
loss:
  type: "vla"
  heatmap_weight: 1.0
  rotation_weight: 0.5
  scale_weight: 0.3
