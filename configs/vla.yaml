# ============================================================================
# SAM-Q VLA Configuration (Unified Parallel Architecture)
# ============================================================================
# [SEG] token → parallel outputs:
#   ├→ SAM3 Decoder    → placement heatmap (position)
#   └→ SEGActionHead   → rotation_6d + rotation_matrix + scale_relative
# ============================================================================

_base_: "base.yaml"

experiment:
  name: "samq_vla"
  description: "SAM-Q with unified parallel heatmap + rotation + scale output"

model:
  num_seg_tokens: 1  # Single [SEG] feeds both branches

  # SEGActionHead config (rotation + scale)
  action_head:
    heatmap_size: 64              # Heatmap resolution
    use_iterative_refinement: false
    max_iterations: 3
    adjustment_threshold: 0.01    # Meters

  # [SEG] token config
  seg_token:
    max_generate_tokens: 128
    dropout: 0.1
    force_only_in_training: true

# Training
training:
  num_epochs: 50
  batch_size: 2
  save_dir: "outputs_vla/"

# VLA loss: heatmap + rotation (6D) + scale
loss:
  type: "vla"
  heatmap_weight: 1.0
  rotation_6d_weight: 0.5
  scale_weight: 0.3
