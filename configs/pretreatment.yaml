# ============================================================================
# SAM-Q Pretreatment Configuration
# ============================================================================
# Configuration for training data generation (pretreat command).
# Generates training samples from SSR3D-FRONT scene JSON files.
# ============================================================================

# ----------------------------------------------------------------------------
# Data Paths
# ----------------------------------------------------------------------------
data:
  scene_dir: "/mnt/d/3D-Dataset/dataset-ssr3dfront/scenes"  # Scene JSON files directory
  model_dir: "/mnt/d/3D-Dataset/3D-FUTURE-model"           # 3D model files directory
  output_dir: "data"                                       # Output directory for generated data

# ----------------------------------------------------------------------------
# Generation Settings
# ----------------------------------------------------------------------------
generation:
  num_samples: 1000          # Target number of samples to generate
  image_size: 1024           # Output image resolution (pixels)
  heatmap_sigma: 15.0        # Gaussian kernel sigma for heatmap
  max_object_ratio: 0.5      # Maximum ratio of objects to remove per scene (0.0~1.0)

# ----------------------------------------------------------------------------
# Data Augmentation
# ----------------------------------------------------------------------------
augmentation:
  enabled: false             # Enable data augmentation
  aug_ratio: 0.5             # Augmentation ratio (reserved for future use)
  rotation_range: 180        # Z-axis rotation range (degrees)
  scale_range:               # Scale range
    min: 0.8
    max: 1.5

# ----------------------------------------------------------------------------
# Camera Settings
# ----------------------------------------------------------------------------
camera:
  top_view_height: 8.0       # Top view camera height
  side_view_distance: 5.0    # Side view camera distance
  fov_degrees: 45            # Field of view in degrees
  aspect_ratio: 1.0          # Aspect ratio (width/height)