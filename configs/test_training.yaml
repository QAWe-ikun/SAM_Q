# ============================================================================
# Test Training Configuration - Stage 2 (Adapter + SAM3 Decoder)
# ============================================================================
# Quick test config with minimal data
# ============================================================================

experiment:
  name: "test_stage2"
  seed: 42
  description: "Test Stage 2: Adapter + SAM3 Decoder training"

data:
  root_dir: "data/"
  ann_file: "annotations.json"
  batch_size: 1
  num_workers: 0
  pin_memory: false
  plane_image_size: [256, 256]
  object_image_size: [256, 256]

model:
  num_seg_tokens: 1

  qwen:
    model_name: "./models/qwen3_vl"
    hidden_dim: 4096
    freeze: true  # ← Stage 2 冻结 Qwen
    attn_implementation: "flash_attention_2"

  sam3:
    model_name: "./models/sam3"
    input_dim: 256
    freeze_image_encoder: true
    freeze_detector: false  # ← Stage 2 解冻 decoder

  adapter:
    freeze: false  # ← Stage 2 解冻
    hidden_dim: 512
    num_queries: 64
    dropout: 0.1

  seg_token:
    max_generate_tokens: 128
    dropout: 0.1

  action_head:
    heatmap_size: 64

loss:
  type: "placement"  # ← placement loss (Dice + BCE + rotation + scale)
  dice_weight: 1.0
  bce_weight: 1.0
  rotation_weight: 0.5
  scale_weight: 0.3

optimizer:
  type: "AdamW"
  lr: 1.0e-3
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]

scheduler:
  type: "CosineAnnealingLR"
  T_max: 3
  eta_min: 1.0e-6
  warmup_epochs: 0

training:
  num_epochs: 3
  device: "cuda"
  save_dir: "/mnt/f/output/stage2"
  save_interval: 1
  save_best: true
  log_interval: 1
  val_interval: 1
  early_stopping: false
