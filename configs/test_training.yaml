# ============================================================================
# Test Training Configuration - Stage 2 (Adapter + SAM3 Decoder)
# ============================================================================
# Quick test config with minimal data
# ============================================================================

experiment:
  name: "test_training"
  seed: 42
  description: "Test training with synthetic data"

data:
  root_dir: "data/"
  batch_size: 1
  num_workers: 0  # Disable multiprocessing for testing
  pin_memory: false
  plane_image_size: [256, 256]  # Smaller for testing
  object_image_size: [256, 256]

model:
  num_seg_tokens: 1

  qwen:
    model_name: "./models/qwen3_vl"
    hidden_dim: 4096
    freeze: true  # Frozen for Stage 2
    attn_implementation: "flash_attention_2"

  sam3:
    model_name: "./models/sam3"
    input_dim: 256
    freeze_image_encoder: true
    freeze_detector: false

  adapter:
    freeze: false  # Trainable
    hidden_dim: 512
    num_queries: 64
    dropout: 0.1

  seg_token:
    max_generate_tokens: 128
    dropout: 0.1

  action_head:
    heatmap_size: 64

loss:
  type: "placement"
  dice_weight: 1.0
  bce_weight: 1.0
  rotation_weight: 0.1
  scale_weight: 0.1

optimizer:
  type: "AdamW"
  lr: 1.0e-3
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]

scheduler:
  type: "CosineAnnealingLR"
  T_max: 5
  eta_min: 1.0e-6
  warmup_epochs: 1

training:
  num_epochs: 3  # Very short for testing
  device: "cuda"
  save_dir: "outputs/test_training/"
  save_interval: 1
  save_best: true
  log_interval: 1
  val_interval: 1
  early_stopping: false
